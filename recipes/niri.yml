modules:
  - type: dnf
    repos:
      cleanup: true
      copr:
        - atim/starship
    install:
      packages:
        - btop
        - chezmoi
        - fastfetch
        - fish
        - hyfetch
        - nvtop
        - starship

  - type: script
    snippets:
      - "dnf install --nogpgcheck --repofrompath 'terra,https://repos.fyralabs.com/terra$releasever' terra-release"
      - "echo 'priority=1' | sudo tee -a /etc/yum.repos.d/terra.repo"
      
  - type: dnf
    install:
      packages:
        - noctalia-shell   
        
  - type: script
    snippets:
      - "echo 'priority=0' | sudo tee -a /etc/yum.repos.d/terra.repo"

  - type: chezmoi
    repository: "https://github.com/koitorin/MizukiOS-Ribbons"
    all-users: true
    file-conflict-policy: skip
