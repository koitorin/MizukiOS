modules:
  - type: dnf
    repos:
      files:
        - https://download.opensuse.org/repositories/home:paulmcauley/Fedora_43/home:paulmcauley.repo
    install:
      packages:
        - klassy

  - type: script
    snippets:
      - "dnf5 versionlock clear"
      - "dnf5 swap --repo=updates -y pipewire pipewire"
      - "dnf5 swap --repo=updates -y pipewire-libs pipewire-libs"
      - "dnf5 swap --repo=fedora -y libfdk-aac fdk-aac-free"

